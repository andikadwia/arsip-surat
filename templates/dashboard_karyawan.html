<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DigiSurat – Dashboard Karyawan</title>
  <meta name="description" content="Dashboard Karyawan Sistem Pengarsipan Surat Digital DigiSurat">
  <link rel="stylesheet" href="../static/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* Stats sesuai referensi karyawan */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 22px;
    }
    .stat-card {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      box-shadow: var(--shadow);
    }
    .stat-card .stat-label {
      font-size: 0.85rem; font-weight: 600;
      color: var(--text-primary); margin-bottom: 14px; display: block;
    }
    .stat-card .stat-value {
      font-size: 1.75rem; font-weight: 700;
      color: var(--text-primary); display: block; text-align: center;
    }

    /* Toolbar sesuai referensi */
    .karyawan-toolbar {
      display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
    }
    .search-field {
      display: flex; align-items: center;
      background: #fff; border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 0 14px;
      height: 40px; min-width: 280px;
    }
    .search-field input {
      border: none; outline: none; background: transparent;
      font-size: 0.88rem; flex: 1; color: var(--text-primary);
    }
    .search-field input::placeholder { color: var(--text-muted); }
    .search-field .search-icon-btn {
      background: none; border: none; cursor: pointer;
      color: var(--text-muted); font-size: 0.9rem; padding: 0; margin-left: 6px;
    }
    .unduh-semua-btn {
      display: flex; align-items: center; gap: 7px;
      background: #fff; border: 1.5px solid var(--border);
      border-radius: var(--radius-sm); padding: 9px 16px;
      font-size: 0.87rem; font-weight: 600; cursor: pointer;
      color: var(--text-primary); transition: background 0.2s;
      white-space: nowrap; margin-left: auto;
    }
    .unduh-semua-btn:hover { background: var(--border-light); }
    .unduh-semua-btn .unduh-icon { font-size: 0.85rem; }

    /* Panel arsip */
    .arsip-panel {
      background: #f5f5f5;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .arsip-panel-title {
      font-size: 1.05rem; font-weight: 700;
      text-align: center; padding: 20px;
      background: #fff; border-bottom: 1px solid var(--border);
    }
    .arsip-table-wrap { background: #fff; overflow-x: auto; }

    /* Unduh action dalam tabel */
    .tbl-unduh-btn {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.82rem; font-weight: 600;
      color: var(--text-primary); background: none; border: none;
      cursor: pointer; padding: 4px 6px;
      transition: color 0.2s;
    }
    .tbl-unduh-btn:hover { color: var(--accent); }
  </style>
</head>
<body>
<div class="app-layout">

  <!-- SIDEBAR - hanya Dashboard -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div style="width:36px;height:36px;background:#253044;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <i class="fa-solid fa-envelope-open-text" style="color:#60a5fa;font-size:1rem;"></i>
      </div>
      <span class="brand-name">Digi<span>Surat</span></span>
    </div>
    <nav class="sidebar-nav">
      <a href="dashboard_karyawan.html" class="nav-item active">
        <i class="nav-icon fa-solid fa-table-cells-large"></i><span>Dashboard</span>
      </a>
    </nav>
  </aside>

  <!-- TOP BAR -->
  <header class="topbar">
    <h1 class="topbar-title">Ruang Kerja: Karyawan</h1>
    <div class="topbar-right">
      <div style="position:relative;">
        <button class="user-menu-btn" id="userMenuBtn" onclick="toggleDropdown()">
          <img src="https://ui-avatars.com/api/?name=Karyawan&background=22c55e&color=fff&size=72"
               alt="Avatar Karyawan" class="user-avatar">
          Karyawan
          <i class="fa-solid fa-chevron-down chevron"></i>
        </button>
        <div class="dropdown-menu" id="dropdownMenu">
          <a href="pengaturan_akun.html"><i class="fa-regular fa-user"></i> Profil Saya</a>
          <div class="dropdown-divider"></div>
          <button class="logout-btn" onclick="handleLogout()">
            <i class="fa-solid fa-right-from-bracket"></i> Logout
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main-content">

    <!-- STATS CARDS -->
    <div class="stats-grid">
      <div class="stat-card">
        <span class="stat-label">Total Surat</span>
        <span class="stat-value" id="statTotalSurat">0</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Total User</span>
        <span class="stat-value">85%</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Akurasi Tertinggi</span>
        <span class="stat-value">82%</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Data Latih</span>
        <span class="stat-value">82%</span>
      </div>
    </div>

    <!-- TOOLBAR: Search + Unduh Semua -->
    <div class="karyawan-toolbar">
      <div class="search-field">
        <input type="text" id="searchInput" placeholder="Cari..." oninput="filterTable()">
        <button class="search-icon-btn" onclick="filterTable()">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </div>
      <button class="unduh-semua-btn" onclick="downloadAllSurat()">
        <i class="fa-solid fa-download unduh-icon"></i>
        Unduh Semua Surat
      </button>
    </div>

    <!-- TABEL ARSIP -->
    <div class="arsip-panel">
      <div class="arsip-panel-title">Daftar Surat Arsip</div>
      <div class="arsip-table-wrap">
        <table class="data-table" id="karyawanTable">
          <thead>
            <tr>
              <th>No</th>
              <th>Nomor Surat</th>
              <th>Tanggal Surat</th>
              <th>Pengirim</th>
              <th>Perihal</th>
              <th>Kategori</th>
              <th>File</th>
              <th>Aksi</th>
            </tr>
          </thead>
          <tbody id="karyawanTableBody"></tbody>
        </table>
      </div>
      <a href="#" class="see-all-link" id="lihatSemuaBtn" onclick="showAllKaryawan(event)">Lihat Semua</a>
    </div>

  </main>
</div>

<!-- MODAL GANTI SANDI -->
<div class="modal-overlay" id="gantiSandiModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title"><i class="fa-solid fa-key"></i> Ganti Password</span>
      <button class="modal-close" onclick="closeModal('gantiSandiModal')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Password Lama</label>
      <div class="pass-input-wrap">
        <input type="password" class="form-control" id="oldPass" placeholder="••••••••">
        <button type="button" class="pass-eye-btn" onclick="togglePassField('oldPass',this)"><i class="fa-solid fa-eye"></i></button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Password Baru</label>
      <div class="pass-input-wrap">
        <input type="password" class="form-control" id="newPass" placeholder="••••••••" oninput="checkStrength(this.value)">
        <button type="button" class="pass-eye-btn" onclick="togglePassField('newPass',this)"><i class="fa-solid fa-eye"></i></button>
      </div>
      <div class="password-strength" id="passStrengthBar"></div>
      <div id="passStrengthLabel" style="font-size:0.75rem;color:var(--text-muted);margin-top:3px;"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Konfirmasi Password Baru</label>
      <div class="pass-input-wrap">
        <input type="password" class="form-control" id="confirmPass" placeholder="••••••••">
        <button type="button" class="pass-eye-btn" onclick="togglePassField('confirmPass',this)"><i class="fa-solid fa-eye"></i></button>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn btn-outline" onclick="closeModal('gantiSandiModal')">Batal</button>
      <button class="btn btn-primary" onclick="submitGantiSandi()"><i class="fa-solid fa-save"></i> Simpan</button>
    </div>
  </div>
</div>

<!-- MODAL LOGOUT -->
<div class="modal-overlay" id="logoutModal">
  <div class="modal" style="max-width:380px;">
    <div class="confirm-icon"><i class="fa-solid fa-right-from-bracket"></i></div>
    <div class="confirm-text">
      <h3>Konfirmasi Logout</h3>
      <p>Apakah Anda yakin ingin keluar dari sistem?</p>
    </div>
    <div class="form-actions" style="justify-content:center;">
      <button class="btn btn-outline" onclick="closeModal('logoutModal')">Batal</button>
      <button class="btn btn-danger" onclick="confirmLogout()">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
      </button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="../static/data.js"></script>
<script src="../static/app.js"></script>
<script>
  initPage('dashboard-karyawan');
  renderKaryawanTable('karyawanTableBody', 5);
  document.getElementById('statTotalSurat').textContent = getLetters().length;

  function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    document.querySelectorAll('#karyawanTableBody tr').forEach(r => {
      r.style.display = r.textContent.toLowerCase().includes(q) ? '' : 'none';
    });
  }

  let showingAll = false;
  function showAllKaryawan(e) {
    e.preventDefault();
    if (!showingAll) {
      showingAll = true;
      renderKaryawanTable('karyawanTableBody', Infinity);
      document.getElementById('lihatSemuaBtn').style.display = 'none';
      showToast('Menampilkan semua surat', 'info');
    }
  }

  function downloadAllSurat() {
    showToast('Mengunduh semua surat...', 'success');
  }
</script>
</body>
</html>
